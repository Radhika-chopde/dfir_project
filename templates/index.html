<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent DFIR | Forensic Tool</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff;
            color: #000000;
        }

        .border-black {
            border: 1px solid #000000;
        }

        .btn-black {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
            border-radius: 0px !important;
            transition: background-color 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 12px;
        }
        .btn-black:hover {
            background-color: #4b5563;
        }
        .btn-black:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            border-color: #94a3b8;
        }

        /* Forces square edges for utilitarian look */
        .rounded-none {
            border-radius: 0px !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 shadow-none">

    <!-- Header Section -->
    <div class="mb-10 text-center">
        <div class="flex items-center justify-center gap-3 mb-2">
            <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04a11.357 11.357 0 00-1.573 5.374c0 1.89.466 3.66 1.288 5.212m11.85 3.144a11.955 11.955 0 01-1.288-5.212m-11.85 3.144l.494.494a3 3 0 004.243 0l.494-.494m-4.737-4.737L3 12m18 0l-1.737-1.737"></path>
            </svg>
            <h1 class="text-3xl font-bold tracking-tighter uppercase">Intelligent DFIR</h1>
        </div>
        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Automated Forensic Triage & Integrity System</p>
    </div>

    <!-- Main Command Card -->
    <div class="bg-white border-black border p-10 rounded-none w-full max-w-lg shadow-none">
        <div class="mb-8 border-b border-gray-100 pb-4">
            <h2 class="text-sm font-bold text-black uppercase tracking-tight">New Investigation</h2>
            <p class="text-[10px] text-gray-400 uppercase mt-1">Specify target directory for artifact extraction</p>
        </div>

        <div class="space-y-6">
            <div>
                <label for="directory_path" class="block text-[9px] font-bold text-black uppercase tracking-widest mb-2 ml-0.5">Target Path</label>
                <input type="text" id="directory_path" 
                       class="w-full border border-black rounded-none py-3 px-4 text-xs focus:outline-none focus:ring-1 focus:ring-black focus:bg-gray-50" 
                       placeholder="e.g. C:\Forensics\Case_001">
            </div>
            
            <button id="start-button" onclick="startAnalysis()" 
                    class="btn-black w-full py-4 shadow-none">
                Start Forensic Scan
            </button>
        </div>

        <!-- Status Messaging -->
        <div id="status-message" class="mt-8 text-center text-[10px] font-bold uppercase h-4"></div>
    </div>

    <!-- System Footer -->
    <div class="mt-12 flex items-center gap-8 opacity-40">
        <div class="text-center">
            <span class="block text-[10px] font-bold text-black uppercase">Merkle Seal</span>
            <span class="text-[8px] uppercase tracking-tighter">Integrity Enabled</span>
        </div>
        <div class="h-6 w-px bg-black"></div>
        <div class="text-center">
            <span class="block text-[10px] font-bold text-black uppercase">Local LLM</span>
            <span class="text-[8px] uppercase tracking-tighter">Privacy Focused</span>
        </div>
    </div>

    <script>
        const pathInput = document.getElementById('directory_path');
        const startButton = document.getElementById('start-button');
        const statusMessage = document.getElementById('status-message');

        async function startAnalysis() {
            const directoryPath = pathInput.value.trim();
            if (!directoryPath) {
                statusMessage.innerHTML = `<span class="text-red-600 italic">Error: Path is required to proceed.</span>`;
                return;
            }

            // UI Feedback
            startButton.disabled = true;
            startButton.innerText = 'Initializing System...';
            statusMessage.innerHTML = `<span class="text-black animate-pulse">Establishing database connection...</span>`;

            try {
                const response = await fetch('/api/start_analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ directory_path: directoryPath })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Connection failed');
                }

                statusMessage.innerHTML = `<span class="text-green-700">Success. Initializing report dashboard...</span>`;
                
                setTimeout(() => {
                    window.location.href = '/report';
                }, 1200);

            } catch (error) {
                statusMessage.innerHTML = `<span class="text-red-600 italic">System Error: ${error.message}</span>`;
                startButton.disabled = false;
                startButton.innerText = 'Start Forensic Scan';
            }
        }

        // Handle Enter Key
        pathInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startAnalysis();
        });
    </script>

</body>
</html>
